<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rift — local-first attack-path reasoning for AI red-teamers">
  <defs>
    <radialGradient id="bg" cx="68%" cy="36%" r="90%">
      <stop offset="0%" stop-color="#101b2e"/>
      <stop offset="100%" stop-color="#090d13"/>
    </radialGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="58%" stop-color="#7d8cff"/>
      <stop offset="100%" stop-color="#ff5c5c"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- wordmark -->
  <text x="80" y="180" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="118" font-weight="700" letter-spacing="-3" fill="#e8eef6">Rift</text>
  <text x="86" y="228" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="25" font-weight="500" fill="#8b97a6">Local-first attack-path reasoning for AI red-teamers</text>
  <rect x="88" y="246" width="430" height="3" rx="1.5" fill="url(#path)" opacity="0.85"/>

  <!-- attack-path motif: corpus -> gate -> target -->
  <g stroke="#39495f" stroke-width="1.5" opacity="0.6" fill="none">
    <line x1="772" y1="98"  x2="944" y2="160"/>
    <line x1="772" y1="160" x2="944" y2="160"/>
    <line x1="772" y1="222" x2="944" y2="160"/>
  </g>
  <path d="M772 160 L944 160 L1052 160 L1156 160" fill="none" stroke="url(#path)" stroke-width="3.5" stroke-linecap="round"/>

  <g fill="#58a6ff">
    <circle cx="772" cy="98"  r="6"/>
    <circle cx="772" cy="160" r="8"/>
    <circle cx="772" cy="222" r="6"/>
  </g>
  <circle cx="944" cy="160" r="9" fill="#7d8cff"/>
  <rect x="1040" y="150" width="24" height="24" rx="3" transform="rotate(45 1052 162)" fill="#0b1220" stroke="#9aa7ff" stroke-width="2"/>
  <circle cx="1156" cy="160" r="17" fill="none" stroke="#ff5c5c" stroke-width="3"/>
  <circle cx="1156" cy="160" r="5" fill="#ff5c5c"/>

  <text x="772"  y="262" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#6b7787" text-anchor="middle">corpus</text>
  <text x="1052" y="206" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#6b7787" text-anchor="middle">gate</text>
  <text x="1156" y="206" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#6b7787" text-anchor="middle">target</text>
</svg>
